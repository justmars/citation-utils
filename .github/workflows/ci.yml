name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Python (UV)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: citation-utils

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v7
        with:
          path: citation-utils

      - name: Checkout local citation-report dependency
        uses: actions/checkout@v7
        with:
          repository: justmars/citation-report
          path: citation-report

      - name: Checkout local citation-date dependency
        uses: actions/checkout@v7
        with:
          repository: justmars/citation-date
          path: citation-date

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install the project with UV
        run: uv sync --locked --all-extras --dev

      - name: Install Dependencies
        run: |
          uv tool install pre-commit --with pre-commit-uv
          pre-commit install-hooks

      - name: Lint with pre-commit
        run: pre-commit run --all-files

      - name: Run tests
        run: uv run pytest

      - name: Check Marimo notebook
        run: uv run marimo check notebooks/*.py

      - name: Build documentation
        run: uv run zensical build --clean --strict

      - name: Build package
        run: uv build --no-sources

      - name: Import built wheel
        run: uv run --no-project --with ./dist/*.whl --with ../citation-date --with ../citation-report python -c "import citation_utils"
